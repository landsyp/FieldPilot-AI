services:
  postgres:
    image: postgres:16-alpine
    container_name: fieldpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fieldpilot}
      POSTGRES_USER: ${POSTGRES_USER:-fieldpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fieldpilot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - fieldpilot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fieldpilot} -d ${POSTGRES_DB:-fieldpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fieldpilot_postgres_data:
